name: attendance-poll

# Runs the poller on a schedule (free). Posts new punches to Slack and saves
# the bookmark back to the repo so the next run continues where this one left off.
on:
  schedule:
    # Every 5 minutes. GitHub's scheduled runs are best-effort, so a run may
    # occasionally land a few minutes late under load.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}        # lets you trigger a run manually from the Actions tab

# Never let two runs overlap (they'd race on the committed state file).
concurrency:
  group: attendance-poll
  cancel-in-progress: false

permissions:
  contents: write              # needed to commit the updated bookmark back

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Poll once
        env:
          ETIME_USERNAME: ${{ secrets.ETIME_USERNAME }}
          ETIME_PASSWORD: ${{ secrets.ETIME_PASSWORD }}
          SLACK_WEBHOOK:  ${{ secrets.SLACK_WEBHOOK }}
          CORPORATE_ID:   landeed
          RUN_ONCE:       '1'
        run: python poller.py
      - name: Persist bookmark
        run: |
          git config user.name  "attendance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update attendance bookmark [skip ci]"
          git push
